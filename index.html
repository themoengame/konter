<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login - Sistem Counter HP</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header" id="loginHeader">
                <!-- Profil toko akan dimuat dinamis di sini -->
                <div class="loading-spinner"></div>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="admin@counter.com" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••" required>
                </div>
                <button type="submit" class="btn-login">Login</button>
                <div id="loginError" class="error-message"></div>
            </form>
            <div class="demo-credentials" id="demoCredentials">
                <p>Demo Akun:</p>
                <small>admin@counter.com / admin123</small>
                <small>kasir1@counter.com / kasir123</small>
                <small>owner@counter.com / owner123</small>
            </div>
            <div class="store-footer" id="storeFooter">
                <!-- Footer toko akan dimuat dinamis di sini -->
            </div>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        // Load profil toko saat halaman login dimuat
        document.addEventListener('DOMContentLoaded', async () => {
            await loadStoreProfile();
        });
        
        async function loadStoreProfile() {
            try {
                const konfigurasi = await getKonfigurasi();
                
                // Update header login dengan profil toko
                const loginHeader = document.getElementById('loginHeader');
                
                // Cek apakah ada logo URL
                const logoHtml = konfigurasi.logo_url && konfigurasi.logo_url !== '' 
                    ? `<img src="${konfigurasi.logo_url}" alt="Logo Toko" class="store-logo" onerror="this.style.display='none'">`
                    : `<div class="store-icon">🏪</div>`;
                
                loginHeader.innerHTML = `
                    ${logoHtml}
                    <h1>${konfigurasi.nama_toko || 'Counter HP System'}</h1>
                    <div class="store-address">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                            <circle cx="12" cy="10" r="3"/>
                        </svg>
                        ${konfigurasi.alamat || 'Jl. Raya No. 123, Jakarta'}
                    </div>
                    <div class="store-contact">
                        ${konfigurasi.telepon ? `<span>📞 ${konfigurasi.telepon}</span>` : ''}
                        ${konfigurasi.whatsapp ? `<span>💬 ${konfigurasi.whatsapp}</span>` : ''}
                        ${konfigurasi.email ? `<span>✉️ ${konfigurasi.email}</span>` : ''}
                    </div>
                `;
                
                // Update footer
                const storeFooter = document.getElementById('storeFooter');
                if (konfigurasi.footer_text) {
                    storeFooter.innerHTML = `
                        <div class="footer-note">
                            ${konfigurasi.footer_text}
                        </div>
                    `;
                } else {
                    storeFooter.innerHTML = `
                        <div class="footer-note">
                            Sistem Manajemen Counter HP | © ${new Date().getFullYear()}
                        </div>
                    `;
                }
                
                // Update judul halaman
                if (konfigurasi.nama_toko) {
                    document.title = `Login - ${konfigurasi.nama_toko}`;
                }
                
            } catch (error) {
                console.error('Error loading store profile:', error);
                // Fallback jika gagal load konfigurasi
                document.getElementById('loginHeader').innerHTML = `
                    <div class="store-icon">📱</div>
                    <h1>Counter HP System</h1>
                    <div class="store-address">Jl. Raya No. 123, Jakarta</div>
                `;
            }
        }
    </script>
    
    <style>
        /* Tambahan style untuk login page dengan profil toko */
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .store-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 15px;
            border-radius: 50%;
            background: var(--light);
            padding: 10px;
        }
        
        .store-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        
        .store-address {
            font-size: 12px;
            color: var(--gray);
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex-wrap: wrap;
        }
        
        .store-contact {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
            font-size: 11px;
            color: var(--gray);
            flex-wrap: wrap;
        }
        
        .store-contact span {
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        
        .store-footer {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        
        .footer-note {
            font-size: 10px;
            color: var(--gray);
            text-align: center;
            line-height: 1.4;
        }
    </style>
</body>
</html>
