<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Transaksi Penjualan</title>
</head>
<body>
    <div class="penjualan-container">
        <div class="section-header">
            <h3>Transaksi Penjualan</h3>
            <div class="filter-bar">
                <input type="text" id="searchProduct" placeholder="Cari produk..." onkeyup="searchProductsGlobal(this.value)">
            </div>
        </div>
        
        <div class="transaction-container">
            <!-- Panel Kiri: Pilih Produk -->
            <div class="product-panel">
                <div class="product-panel-header">
                    <h3>Pilih Produk</h3>
                </div>
                
                <!-- Tabs -->
                <div class="tabs">
                    <button class="tab-btn active" data-tab="barang" onclick="switchTabGlobal('barang')">📱 Barang</button>
                    <button class="tab-btn" data-tab="pulsa" onclick="switchTabGlobal('pulsa')">📡 Pulsa</button>
                    <button class="tab-btn" data-tab="pembayaran" onclick="switchTabGlobal('pembayaran')">💳 Pembayaran</button>
                    <button class="tab-btn" data-tab="servis" onclick="switchTabGlobal('servis')">🔧 Servis</button>
                </div>
                
                <!-- Product List -->
                <div id="productList" class="product-list">
                    <div class="loading">Memuat produk...</div>
                </div>
            </div>
            
            <!-- Panel Kanan: Keranjang -->
            <div class="cart-panel">
                <div class="cart-header">
                    <h3>🛒 Keranjang Belanja</h3>
                </div>
                <div id="cartItems" class="cart-items">
                    <div style="text-align:center; padding:20px; color:#999;">Keranjang kosong</div>
                </div>
                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Total</span>
                        <span id="cartTotal">Rp 0</span>
                    </div>
                    <div class="summary-row">
                        <span>Diskon</span>
                        <span><input type="number" id="diskonInput" value="0" onchange="updateGrandTotalGlobal()" style="width:100px; text-align:right;"></span>
                    </div>
                    <div class="summary-row total">
                        <span>Grand Total</span>
                        <span id="grandTotal">Rp 0</span>
                    </div>
                </div>
                <div class="cart-actions">
                    <button class="btn-secondary" onclick="clearCartGlobal()">Kosongkan</button>
                    <button class="btn-primary" onclick="showPaymentModalGlobal()">Bayar</button>
                </div>
            </div>
        </div>
        
        <!-- Informasi Tambahan -->
        <div class="transaction-info">
            <div class="info-row">
                <div class="form-group">
                    <label>ID Konsumen</label>
                    <input type="text" id="idKonsumen" placeholder="C001">
                </div>
                <div class="form-group" style="position: relative;">
                    <label>Nama Konsumen</label>
                    <input type="text" id="namaKonsumen" placeholder="Cari konsumen..." onkeyup="searchKonsumenGlobal(this.value)">
                    <div id="konsumenSearchResult" class="search-result-dropdown" style="display:none;"></div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .search-result-dropdown {
            position: absolute;
            background: white;
            border: 1px solid #ddd;
            border-radius: var(--radius);
            max-height: 200px;
            overflow-y: auto;
            width: 100%;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        .search-result-dropdown div {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        .search-result-dropdown div:hover {
            background: var(--light);
        }
    </style>

    <script>
        // Global cart untuk halaman ini
        let localCart = [];
        let localProducts = { barang: [], pulsa: [], pembayaran: [], servis: [] };
        let localActiveTab = 'barang';
        let localSearchKeyword = '';
        let localKonsumenList = [];
        
        // Inisialisasi halaman
        document.addEventListener('DOMContentLoaded', async () => {
            await loadAllProductsLocal();
            renderProductListLocal();
            updateCartDisplayLocal();
        });
        
        async function loadAllProductsLocal() {
            try {
                const [barang, pulsa, pembayaran, servis] = await Promise.all([
                    getAllMaster('barang'),
                    getAllMaster('pulsa'),
                    getAllMaster('pembayaran'),
                    getAllMaster('servis')
                ]);
                localProducts = { barang, pulsa, pembayaran, servis };
                renderProductListLocal();
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('productList').innerHTML = '<div class="error-message">Gagal memuat produk</div>';
            }
        }
        
        function renderProductListLocal() {
            const products = localProducts[localActiveTab] || [];
            let filtered = products;
            if (localSearchKeyword) {
                filtered = products.filter(p => {
                    const name = p.nama_barang || p.nama_servis || p.operator || p.provider || '';
                    return name.toLowerCase().includes(localSearchKeyword.toLowerCase());
                });
            }
            
            const container = document.getElementById('productList');
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px;">Tidak ada produk</div>';
                return;
            }
            
            container.innerHTML = filtered.map(product => {
                const productId = product.id;
                const productName = product.nama_barang || product.nama_servis || product.operator + ' ' + formatRupiah(product.nominal) || product.provider;
                const price = product.harga_jual || product.fee_jual || product.biaya_jasa || 0;
                const stock = product.stok || product.stok_deposit || (localActiveTab === 'servis' ? 999 : 0);
                
                return `
                    <div class="product-item">
                        <div class="product-info">
                            <div class="product-name">${escapeHtml(productName)}</div>
                            <div class="product-price">${formatRupiah(price)}</div>
                            <div class="product-stock">Stok: ${stock === 999 ? '∞' : stock}</div>
                        </div>
                        <div class="product-actions">
                            <input type="number" id="qty_${productId}" min="1" max="${stock === 999 ? 999 : stock}" value="1" style="width:60px;">
                            <button class="btn-add" onclick="addToCartLocal('${localActiveTab}', '${productId}', '${escapeHtml(productName).replace(/'/g, "\\'")}', ${price})">Tambah</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function switchTabGlobal(tab) {
            localActiveTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
            renderProductListLocal();
        }
        
        function searchProductsGlobal(keyword) {
            localSearchKeyword = keyword;
            renderProductListLocal();
        }
        
        function addToCartLocal(tipe, id, nama, harga) {
            const qtyInput = document.getElementById(`qty_${id}`);
            let qty = 1;
            if (qtyInput) qty = parseInt(qtyInput.value) || 1;
            
            // Cek stok
            if (tipe === 'barang') {
                const product = localProducts.barang.find(p => p.id === id);
                if (product && qty > product.stok) {
                    showToast(`Stok tidak mencukupi. Stok tersedia: ${product.stok}`, 'warning');
                    return;
                }
            }
            if (tipe === 'pulsa' || tipe === 'pembayaran') {
                const products = tipe === 'pulsa' ? localProducts.pulsa : localProducts.pembayaran;
                const product = products.find(p => p.id === id);
                if (product && qty > (product.stok_deposit || 999)) {
                    showToast(`Stok deposit tidak mencukupi`, 'warning');
                    return;
                }
            }
            
            const existing = localCart.find(item => item.id === id && item.tipe === tipe);
            if (existing) {
                existing.qty += qty;
            } else {
                localCart.push({ id, tipe, nama, harga, qty });
            }
            
            updateCartDisplayLocal();
            showToast(`${nama} ditambahkan ke keranjang`, 'success');
        }
        
        function updateCartDisplayLocal() {
            const container = document.getElementById('cartItems');
            const totalSpan = document.getElementById('cartTotal');
            
            let total = 0;
            
            if (localCart.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:#999;">Keranjang kosong</div>';
                totalSpan.textContent = formatRupiah(0);
                updateGrandTotalGlobal();
                return;
            }
            
            container.innerHTML = localCart.map((item, index) => {
                const subtotal = item.harga * item.qty;
                total += subtotal;
                
                let tipeIcon = '';
                switch(item.tipe) {
                    case 'barang': tipeIcon = '📱'; break;
                    case 'pulsa': tipeIcon = '📡'; break;
                    case 'pembayaran': tipeIcon = '💳'; break;
                    case 'servis': tipeIcon = '🔧'; break;
                }
                
                return `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${tipeIcon} ${escapeHtml(item.nama)}</div>
                            <div class="cart-item-price">${formatRupiah(item.harga)}</div>
                            <div class="cart-item-qty">
                                <button class="btn-qty-minus" onclick="updateCartQtyLocal(${index}, -1)">-</button>
                                <span>${item.qty}</span>
                                <button class="btn-qty-plus" onclick="updateCartQtyLocal(${index}, 1)">+</button>
                            </div>
                        </div>
                        <div class="cart-item-subtotal">${formatRupiah(subtotal)}</div>
                        <button class="cart-item-remove" onclick="removeFromCartLocal(${index})">&times;</button>
                    </div>
                `;
            }).join('');
            
            totalSpan.textContent = formatRupiah(total);
            updateGrandTotalGlobal();
        }
        
        function updateCartQtyLocal(index, delta) {
            const item = localCart[index];
            if (!item) return;
            
            const newQty = item.qty + delta;
            if (newQty < 1) {
                removeFromCartLocal(index);
                return;
            }
            
            item.qty = newQty;
            updateCartDisplayLocal();
        }
        
        function removeFromCartLocal(index) {
            localCart.splice(index, 1);
            updateCartDisplayLocal();
        }
        
        function clearCartGlobal() {
            if (localCart.length > 0 && confirm('Kosongkan keranjang?')) {
                localCart = [];
                updateCartDisplayLocal();
                showToast('Keranjang dikosongkan', 'info');
            }
        }
        
        function updateGrandTotalGlobal() {
            const totalSpan = document.getElementById('cartTotal');
            const diskonInput = document.getElementById('diskonInput');
            const grandTotalSpan = document.getElementById('grandTotal');
            
            if (!totalSpan || !diskonInput || !grandTotalSpan) return;
            
            const total = parseRupiah(totalSpan.textContent);
            const diskon = parseInt(diskonInput.value) || 0;
            const grandTotal = Math.max(0, total - diskon);
            
            grandTotalSpan.textContent = formatRupiah(grandTotal);
        }
        
        async function searchKonsumenGlobal(keyword) {
            const resultDiv = document.getElementById('konsumenSearchResult');
            if (!keyword || keyword.length < 2) {
                resultDiv.style.display = 'none';
                return;
            }
            
            if (localKonsumenList.length === 0) {
                localKonsumenList = await getAllMaster('konsumen');
            }
            
            const filtered = localKonsumenList.filter(k => 
                k.nama.toLowerCase().includes(keyword.toLowerCase()) ||
                (k.email && k.email.toLowerCase().includes(keyword.toLowerCase())) ||
                (k.telepon && k.telepon.includes(keyword))
            );
            
            if (filtered.length > 0) {
                resultDiv.innerHTML = filtered.map(k => `
                    <div onclick="selectKonsumenGlobal('${k.id}', '${escapeHtml(k.nama).replace(/'/g, "\\'")}')">
                        <strong>${escapeHtml(k.nama)}</strong><br>
                        <small>${k.email || ''} | ${k.telepon || ''}</small>
                    </div>
                `).join('');
                resultDiv.style.display = 'block';
            } else {
                resultDiv.style.display = 'none';
            }
        }
        
        function selectKonsumenGlobal(id, nama) {
            document.getElementById('idKonsumen').value = id;
            document.getElementById('namaKonsumen').value = nama;
            document.getElementById('konsumenSearchResult').style.display = 'none';
        }
        
        function showPaymentModalGlobal() {
            if (localCart.length === 0) {
                showToast('Keranjang masih kosong', 'warning');
                return;
            }
            
            const grandTotalSpan = document.getElementById('grandTotal');
            const grandTotal = parseRupiah(grandTotalSpan.textContent);
            
            const modal = document.getElementById('globalModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            
            modalTitle.textContent = 'Pembayaran';
            
            modalBody.innerHTML = `
                <form id="paymentForm">
                    <div class="form-group">
                        <label>Grand Total</label>
                        <input type="text" id="modalGrandTotal" value="${formatRupiah(grandTotal)}" readonly style="background:#f5f5f5;">
                    </div>
                    <div class="form-group">
                        <label>Jumlah Bayar</label>
                        <input type="number" id="jumlahBayar" placeholder="Masukkan jumlah bayar" oninput="calculateKembalianGlobal()">
                    </div>
                    <div class="form-group">
                        <label>Kembalian</label>
                        <input type="text" id="kembalian" readonly style="background:#f5f5f5;">
                    </div>
                    <div class="form-group">
                        <label>Metode Pembayaran</label>
                        <select id="metodeBayar">
                            <option value="Cash">Cash</option>
                            <option value="QRIS">QRIS</option>
                            <option value="Transfer">Transfer</option>
                        </select>
                    </div>
                </form>
            `;
            
            window.calculateKembalianGlobal = function() {
                const total = grandTotal;
                const bayar = parseInt(document.getElementById('jumlahBayar')?.value) || 0;
                const kembalian = bayar - total;
                const kembalianInput = document.getElementById('kembalian');
                if (kembalianInput) {
                    kembalianInput.value = kembalian >= 0 ? formatRupiah(kembalian) : 'Kurang Rp ' + formatRupiah(Math.abs(kembalian));
                }
            };
            
            const saveBtn = modal.querySelector('.modal-save');
            saveBtn.textContent = 'Proses Transaksi';
            saveBtn.onclick = async () => {
                await prosesTransaksiGlobal();
            };
            
            modal.style.display = 'flex';
        }
        
        async function prosesTransaksiGlobal() {
            const idKonsumen = document.getElementById('idKonsumen')?.value;
            const diskon = parseInt(document.getElementById('diskonInput')?.value) || 0;
            const metodeBayar = document.getElementById('metodeBayar')?.value;
            const jumlahBayar = parseInt(document.getElementById('jumlahBayar')?.value) || 0;
            const grandTotalSpan = document.getElementById('grandTotal');
            const grandTotal = parseRupiah(grandTotalSpan.textContent);
            
            if (!idKonsumen) {
                showToast('Pilih konsumen terlebih dahulu', 'warning');
                return;
            }
            
            if (jumlahBayar < grandTotal) {
                showToast('Jumlah bayar kurang', 'warning');
                return;
            }
            
            const items = localCart.map(item => ({
                tipe_produk: item.tipe,
                id_ref: item.id,
                qty: item.qty,
                harga_satuan: item.harga,
                subtotal: item.harga * item.qty
            }));
            
            const data = {
                id_konsumen: idKonsumen,
                total_bayar: grandTotal + diskon,
                diskon: diskon,
                grand_total: grandTotal,
                metode_pembayaran: metodeBayar,
                items: JSON.stringify(items)
            };
            
            showLoading(true);
            
            try {
                const result = await savePenjualan(data);
                if (result.success) {
                    showToast(`Transaksi berhasil! ID: ${result.id_transaksi}`, 'success');
                    closeModal();
                    localCart = [];
                    updateCartDisplayLocal();
                    document.getElementById('idKonsumen').value = '';
                    document.getElementById('namaKonsumen').value = '';
                    document.getElementById('diskonInput').value = 0;
                    await loadAllProductsLocal();
                }
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                showLoading(false);
            }
        }
        
        // Export ke global
        window.switchTabGlobal = switchTabGlobal;
        window.searchProductsGlobal = searchProductsGlobal;
        window.addToCartLocal = addToCartLocal;
        window.updateCartQtyLocal = updateCartQtyLocal;
        window.removeFromCartLocal = removeFromCartLocal;
        window.clearCartGlobal = clearCartGlobal;
        window.updateGrandTotalGlobal = updateGrandTotalGlobal;
        window.searchKonsumenGlobal = searchKonsumenGlobal;
        window.selectKonsumenGlobal = selectKonsumenGlobal;
        window.showPaymentModalGlobal = showPaymentModalGlobal;
    </script>
</body>
</html>
