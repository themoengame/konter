<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Laporan Servis</title>
</head>
<body>
    <div class="laporan-container">
        <div class="section-header">
            <h3>🛠️ Laporan Servis</h3>
            <div class="filter-bar">
                <input type="date" id="tglDariServis" value="">
                <span>s/d</span>
                <input type="date" id="tglSampaiServis" value="">
                <button class="btn-primary" onclick="loadLaporanServisPage()">Tampilkan</button>
                <button class="btn-secondary" onclick="exportLaporanServisPage()">📥 Export CSV</button>
                <button class="btn-secondary" onclick="printLaporanServis()">🖨️ Print</button>
            </div>
        </div>
        
        <div class="dashboard-grid" style="margin-bottom:20px;">
            <div class="stat-card">
                <h3>🔧 Total Servis Terjual</h3>
                <p class="stat-value" id="totalServis">0</p>
            </div>
            <div class="stat-card">
                <h3>💰 Total Pendapatan Servis</h3>
                <p class="stat-value" id="totalPendapatanServis">Rp 0</p>
            </div>
            <div class="stat-card">
                <h3>📋 Kategori Terbanyak</h3>
                <p class="stat-value" id="kategoriTerbanyak">-</p>
            </div>
        </div>
        
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <td>
                        <th>ID Transaksi</th>
                        <th>Tanggal</th>
                        <th>Konsumen</th>
                        <th>ID Servis</th>
                        <th>Nama Servis</th>
                        <th>Kategori</th>
                        <th>Qty</th>
                        <th>Harga</th>
                        <th>Estimasi Hari</th>
                        <th>Garansi Hari</th>
                    </tr>
                </thead>
                <tbody id="laporanServisBody">
                    <tr><td colspan="10" style="text-align:center">Pilih tanggal dan klik Tampilkan</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let laporanServisData = [];
        
        document.addEventListener('DOMContentLoaded', () => {
            const today = getTodayDate();
            const lastWeek = new Date();
            lastWeek.setDate(lastWeek.getDate() - 7);
            const lastWeekStr = lastWeek.toISOString().slice(0, 10);
            
            document.getElementById('tglDariServis').value = lastWeekStr;
            document.getElementById('tglSampaiServis').value = today;
            
            loadLaporanServisPage();
        });
        
        async function loadLaporanServisPage() {
            const tglDari = document.getElementById('tglDariServis')?.value;
            const tglSampai = document.getElementById('tglSampaiServis')?.value;
            
            if (!tglDari || !tglSampai) {
                showToast('Pilih rentang tanggal', 'warning');
                return;
            }
            
            showLoading(true);
            
            try {
                const data = await getLaporanServis(tglDari, tglSampai);
                laporanServisData = data;
                
                const tbody = document.getElementById('laporanServisBody');
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center">Tidak ada data servis</td></tr>';
                    document.getElementById('totalServis').textContent = '0';
                    document.getElementById('totalPendapatanServis').textContent = formatRupiah(0);
                    document.getElementById('kategoriTerbanyak').textContent = '-';
                    return;
                }
                
                let totalQty = 0;
                let totalPendapatan = 0;
                const kategoriCount = {};
                
                tbody.innerHTML = data.map(item => {
                    totalQty += item.qty || 1;
                    totalPendapatan += (item.harga || 0) * (item.qty || 1);
                    
                    const kategori = item.kategori || 'Lainnya';
                    kategoriCount[kategori] = (kategoriCount[kategori] || 0) + 1;
                    
                    return `
                        <tr>
                            <td>${item.id_transaksi || '-'}</td>
                            <td>${formatTanggal(item.tgl)}</td>
                            <td>${item.konsumen || '-'}</td>
                            <td>${item.id_servis || '-'}</td>
                            <td>${escapeHtml(item.nama_servis) || '-'}</td>
                            <td>${item.kategori || '-'}</td>
                            <td>${item.qty || 1}</td>
                            <td>${formatRupiah(item.harga || 0)}</td>
                            <td>${item.estimasi_hari || 0} hari</td>
                            <td>${item.garansi_hari || 0} hari</td>
                        </tr>
                    `;
                }).join('');
                
                document.getElementById('totalServis').textContent = totalQty;
                document.getElementById('totalPendapatanServis').textContent = formatRupiah(totalPendapatan);
                
                let maxKategori = '-';
                let maxCount = 0;
                for (const [kategori, count] of Object.entries(kategoriCount)) {
                    if (count > maxCount) {
                        maxCount = count;
                        maxKategori = kategori;
                    }
                }
                document.getElementById('kategoriTerbanyak').textContent = `${maxKategori} (${maxCount}x)`;
                
            } catch (error) {
                console.error('Error loading laporan servis:', error);
                showToast('Gagal memuat laporan servis', 'error');
            } finally {
                showLoading(false);
            }
        }
        
        function exportLaporanServisPage() {
            if (laporanServisData.length === 0) {
                showToast('Tidak ada data untuk diekspor', 'warning');
                return;
            }
            
            exportToCSV(laporanServisData, 'laporan_servis');
        }
        
        function printLaporanServis() {
            const printContent = document.querySelector('.table-container').innerHTML;
            const header = document.querySelector('.section-header h3').innerHTML;
            const stats = document.querySelector('.dashboard-grid').innerHTML;
            const tglDari = document.getElementById('tglDariServis').value;
            const tglSampai = document.getElementById('tglSampaiServis').value;
            
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                <head>
                    <title>Laporan Servis</title>
                    <style>
                        body { font-family: Arial, sans-serif; padding: 20px; }
                        h2 { text-align: center; }
                        .stats { display: flex; gap: 20px; margin: 20px 0; }
                        .stat-card { border: 1px solid #ddd; padding: 10px; border-radius: 5px; text-align: center; flex: 1; }
                        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
                        th { background: #f5f5f5; }
                        .footer { margin-top: 30px; text-align: right; }
                    </style>
                </head>
                <body>
                    <h2>Laporan Servis</h2>
                    <p>Periode: ${tglDari} s/d ${tglSampai}</p>
                    <div class="stats">${stats}</div>
                    ${printContent}
                    <div class="footer">
                        <p>Dicetak pada: ${new Date().toLocaleString()}</p>
                    </div>
                </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        }
        
        window.loadLaporanServisPage = loadLaporanServisPage;
        window.exportLaporanServisPage = exportLaporanServisPage;
        window.printLaporanServis = printLaporanServis;
    </script>
</body>
</html>
