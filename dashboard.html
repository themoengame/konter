<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dashboard - Counter HP System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/transaksi.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">📱 CounterHP</div>
                <button class="sidebar-toggle" id="sidebarToggle">☰</button>
            </div>
            <nav class="sidebar-nav">
                <ul id="mainMenu">
                    <!-- Menu akan diisi oleh JavaScript berdasarkan role -->
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info" id="userInfo">
                    <span class="user-name">Loading...</span>
                    <span class="user-role" id="userRole"></span>
                </div>
                <button id="logoutBtn" class="btn-logout">🚪 Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h2 id="pageTitle">Dashboard</h2>
                <div class="top-bar-actions">
                    <span id="dateTime"></span>
                </div>
            </header>
            <div class="content-area" id="contentArea">
                <!-- Konten dinamis akan dimuat di sini -->
                <div class="loading">Memuat...</div>
            </div>
        </main>
    </div>

    <!-- Modal Global -->
    <div id="globalModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Modal</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn-secondary modal-cancel">Batal</button>
                <button class="btn-primary modal-save">Simpan</button>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    
    <!-- Master Modules -->
    <script src="js/master/barang.js"></script>
    <script src="js/master/supplier.js"></script>
    <script src="js/master/konsumen.js"></script>
    <script src="js/master/pulsa.js"></script>
    <script src="js/master/pembayaran.js"></script>
    <script src="js/master/servis.js"></script>
    
    <!-- Transaction Modules -->
    <script src="js/transaksi/penjualan.js"></script>
    <script src="js/transaksi/pembelian.js"></script>
    
    <!-- Report Modules -->
    <script src="js/laporan/penjualan.js"></script>
    <script src="js/laporan/servis.js"></script>
</body>
</html>
